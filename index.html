<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Login - Free Internet</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        .footer { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ລົງທະບຽນໃຊ້ WiFi</h2>
    <p>ກະລຸນາກອກຂໍ້ມູນເພື່ອຮັບເນັດຟຣີ</p>
    
    <form id="wifiForm">
        <input type="text" id="full_name" placeholder="ຊື່ ແລະ ນາມສະກຸນ" required>
        <input type="tel" id="phone_number" placeholder="ເບີໂທລະສັບ" required>
        <button type="submit" id="submitBtn">ເຂົ້າໃຊ້ງານເນັດ</button>
    </form>

    <div class="footer">
        ໂດຍການກົດ "ເຂົ້າໃຊ້ງານ", ທ່ານຍອມຮັບເງື່ອນໄຂການໃຊ້ງານ.
    </div>
</div>

<script>
    document.getElementById('wifiForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "ກຳລັງປະມວນຜົນ...";

        const userData = {
            full_name: document.getElementById('full_name').value,
            phone_number: document.getElementById('phone_number').value
        };

        try {
            // 1. ສົ່ງຂໍ້ມູນໄປຫາ API ຂອງທ່ານເພື່ອເກັບລົງ Database
            const response = await fetch('http://10.150.1.85:3095/api/v1/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            // 2. ຫຼັງຈາກເກັບຂໍ້ມູນແລ້ວ, ສົ່ງຄຳສັ່ງ Login ໄປຫາ Aruba
            // ໝາຍເຫດ: Aruba ຈະແນບ Parameter ມາໃນ URL ເວລາ Redirect ລູກຄ້າມາ (ເຊັ່ນ user_mac, switch_url)
            const urlParams = new URLSearchParams(window.location.search);
            const postUrl = urlParams.get('switch_url'); // ນີ້ຄື URL ຂອງ Aruba ທີ່ໃຊ້ຮັບ Login

            if (postUrl) {
                const loginForm = document.createElement('form');
                loginForm.method = 'POST';
                loginForm.action = postUrl;

                // ສ້າງ Input ທີ່ Aruba ຕ້ອງການ (ປົກກະຕິແມ່ນ user, password)
                const fields = {
                    'buttonClicked': '4', // ຄ່າທີ່ Aruba ໃຊ້ເພື່ອບອກວ່າກົດ Login
                    'user': userData.phone_number, 
                    'password': 'nopassword' // ຫຼື ໃຊ້ລະຫັດກາງທີ່ທ່ານຕັ້ງໄວ້
                };

                for (const key in fields) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = fields[key];
                    loginForm.appendChild(input);
                }

                document.body.appendChild(loginForm);
                loginForm.submit();
            } else {
                alert("ສຳເລັດ! ທ່ານສາມາດໃຊ້ງານເນັດໄດ້ແລ້ວ.");
            }

        } catch (error) {
            console.error('Error:', error);
            alert("ເກີດຂໍ້ຜິດພາດ, ກະລຸນາລອງໃໝ່.");
            btn.disabled = false;
            btn.innerText = "ເຂົ້າໃຊ້ງານເນັດ";
        }
    });
</script>

</body>
</html>
